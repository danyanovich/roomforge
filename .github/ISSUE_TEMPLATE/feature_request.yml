name: Feature request
description: Suggest an improvement for the planner, catalog, exports, or docs.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What workflow or limitation should improve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Describe the ideal behavior.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - 2D planner
        - Isometric view
        - 3D view
        - Catalog and inspector
        - Layout validation
        - Export
        - Docs
  - type: textarea
    id: references
    attributes:
      label: References
      description: Links, screenshots, or examples.
